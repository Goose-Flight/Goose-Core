name: Initialize Wiki
on:
  workflow_dispatch:
jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git" /tmp/wiki 2>&1 || {
            mkdir -p /tmp/wiki
            cd /tmp/wiki
            git init
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          }
          cd /tmp/wiki
          echo "# Welcome to Goose" > Home.md
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "docs: bootstrap wiki"
          git push -u origin HEAD:master || git push --force -u origin HEAD:master
