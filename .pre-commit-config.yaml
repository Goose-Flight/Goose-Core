repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      # Linter — catches blind excepts (BLE001), swallow-and-pass (S110),
      # bugbear issues (B), and security patterns (S) before every commit.
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter
      - id: ruff-format
