name: Initialize Wiki
on:
  workflow_dispatch:
jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap wiki
        env:
          WIKI_PAT: ${{ secrets.GOOSE_WIKI_PAT }}
          REPO: ${{ github.repository }}
        run: |
          git clone "https://goose-flight:${WIKI_PAT}@github.com/${REPO}.wiki.git" /tmp/wiki 2>&1 || {
            mkdir -p /tmp/wiki
            cd /tmp/wiki
            git init
            git remote add origin "https://goose-flight:${WIKI_PAT}@github.com/${REPO}.wiki.git"
          }
          cd /tmp/wiki
          echo "# Welcome to Goose" > Home.md
          git config user.email "admin@flygoose.dev"
          git config user.name "Goose Flight"
          git add .
          git diff --staged --quiet || git commit -m "docs: bootstrap wiki"
          git push -u origin HEAD:master || git push --force -u origin HEAD:master
