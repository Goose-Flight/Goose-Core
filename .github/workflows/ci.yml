name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Lint and format ─────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  # ── Type checking ────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install with dev deps
        run: pip install -e ".[dev]"
      - run: mypy src/goose --ignore-missing-imports

  # ── Tests and coverage ───────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install with dev deps
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src/goose \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit pip-audit
      - name: Run bandit
        run: bandit -r src/goose -ll -ii --skip B101,B404
      - name: Run pip-audit
        run: pip-audit --requirement <(pip install -e . --dry-run 2>&1 | grep Requirement | awk '{print $2}') || true

  # ── Forensic integrity check ─────────────────────────────────────────────────
  # Runs once all other checks pass — gate for PR merge
  all-checks-pass:
    name: All checks pass
    needs: [lint, typecheck, test, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Tests failed"
            exit 1
          fi
          echo "All required checks passed"
